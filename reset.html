                <li> <a href="password.html" target="_self"> <img src="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse3.mm.bing.net%2Fth%2Fid%2FOIP.zbI6Pnvpz3JmcXxEY0CPHgHaHa%3Fpid%3DApi&f=1&ipt=0e82aba2d8b8e6e1e86491a8567495342fea767b6e71788cfb0b6f975c974b8b&ipo=images"> Password </a> </li>

        <a href="home.html" target="_self" style="position: absolute; top: 0px; left: 5px; font-weight: lighter;"> ✖ </a>
        <main>
            <h2 class="subheading"> Restore settings </h2>
            <section class="container">
                <input type="button" onclick="restore()" value="Restore Settings">
            </section>
        </main>
        <script>
            function restore()
            {
                let check=prompt("Enter CONFIRM to continue.");
                let settings={
                    bgimg: "https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse3.mm.bing.net%2Fth%2Fid%2FOIP.YbbxxABEI4rJ5RkX4jrc6AHaEJ%3Fpid%3DApi&f=1&ipt=57ee2e16f7e4ad4b771b8f4503739a117dd6fd98b4ff81510d3d4009c3889301&ipo=images",
                    bgcolor: "white",
                    hfcolor: "white",
                    txtcolor: "black",
                    hovercolor: "gold",
                    style: "Arial, Helvetica, sans-serif"
                }
                if(check==="CONFIRM")
                {
                    localStorage.setItem("settings", JSON.stringify(settings));
                    window.location.href="home.html";
                }
            }
        </script>
    </body>
