<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title> TRIPURAVIDYA - Settings - Restore Settings </title>
        <link rel="stylesheet" type="text/css" href="css/settings.css">
        <style>
            input[type="radio"]
            {
                padding-left: 20px;
            }
            #bgimage, #bgcolor, #bgcolor-label
            {
                display: none;
            }
            input[type="color"]
            {
                height: 30px;
                width: 30px;
            }
            .container form
            {
                display: flex;
                flex-direction: column;
                gap: 20px;
                font-size: 18px;
            }
            .bgcolor-container
            {
                display: flex;
                flex-direction: row;
                align-items: center;
                gap: 10px;
            }
            select
            {
                border-radius: 4px;
            }
            option, select
            {
                font-size: 16px;
            }
        </style>
    </head>
    <body>
        <header class="settings-container">
            <h2 class="heading"> Settings </h2>
            <form>
                <input type="search" name="search" id="search" placeholder="Search Settings">
            </form>
            <ul>
                <li> <a href="profile.html" target="_self"> <img src="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse1.mm.bing.net%2Fth%2Fid%2FOIP.bJpr9jpclIkXQT-hkkb1KQHaHa%3Fpid%3DApi&f=1&ipt=99411bbcbea5039044259eb2aa7c8f97dff7c34c372a067aa8aeb145e5024650&ipo=images"> Profile </a> </li>
                <li> <a href="password.html" target="_self"> <img src="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse3.mm.bing.net%2Fth%2Fid%2FOIP.zbI6Pnvpz3JmcXxEY0CPHgHaHa%3Fpid%3DApi&f=1&ipt=0e82aba2d8b8e6e1e86491a8567495342fea767b6e71788cfb0b6f975c974b8b&ipo=images"> Password </a> </li>
                <li style="background-color: lightgray; border-radius: 4px;"> <a href="appearance.html" target="_self"> <img src="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse3.mm.bing.net%2Fth%2Fid%2FOIP.B7tsaS4e1o9w28ewiWlvNgHaHa%3Fpid%3DApi&f=1&ipt=38e46b3f42b6afcb839524b85e70ad6400a3d6b9926f3d04cf5d1b46e3d7d0f6&ipo=images"> Appearance </a> </li>
                <li> <a href="reset.html" target="_self"> <img src="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse1.mm.bing.net%2Fth%2Fid%2FOIP.yZoDGitVuS1HHxCn1iJy0gHaHa%3Fpid%3DApi&f=1&ipt=ecf24811988edd43d929cd40e5e691e4b4a4dabe2cc8a14668c8263073f07d95&ipo=images"> Restore Settings </a> </li>
            </ul>
        </header>
        <a href="home.html" target="_self" style="position: absolute; top: 0px; left: 5px; font-weight: lighter;"> ✖ </a>
        <main>
            <h2 class="subheading"> Appearance </h2>
            <section class="container">
                <form>
                    <label for="bg"> Background - </label>
                    <div class="input-container">
                        <input type="radio" name="bg" value="image" id="image-radio"> Background image 
                        <input type="button" onclick="changeBgImage()" value="Enter URL" id="bgimage">
                    </div>
                    <div class="input-container"> 
                        <input type="radio" name="bg" value="color" id="bgcolor-radio"> Background color
                        <div class="bgcolor-container">
                            <label for="color" id="bgcolor-label"> Choose color - </label>
                            <input type="color" name="bg" value="#ffffff" id="bgcolor">
                        </div>
                    </div>
                    <div class="input-container">
                        <label for="hfcolor" id="hfcolor-label"> Header & Footer Color - </label>
                        <input type="color" name="hfcolor" value="#ffffff" id="hfcolor">
                    </div>
                    <div class="input-container">
                        <label for="txtcolor"> Text Color - </label>
                        <input type="color" name="txtcolor" value="#fff" id="txtcolor">
                    </div>
                    <div class="input-container">
                        <label for="font"> Font Style - </label>
                        <select id="font" name="font">
                            <option value="Arial, Helvetica, sans-serif" selected> Arial </option>
                            <option value="Times New Roman"> Times New Roman </option>
                            <option value="Verdana"> Verdana </option>
                            <option value="Tahoma"> Tahoma </option>
                            <option value="Segoe UI"> Segoe UI </option>
                            <option value="Robota"> Robota </option>
                            <option value="Optima"> Optima </option>
                            <option value="Georgia"> Georgia </option>
                            <option value="Book Antiqua"> Book Antiqua </option>
                            <option value="Lucida Console"> Lucida Console </option>
                            <option value="Consolas"> Consolas </option>
                            <option value="Menlo"> Menlo </option>
                            <option value="Monaco"> Monaco </option>
                            <option value="Comic Sans MS"> Comic Sans MS </option>
                            <option value="Brush Script MT"> Brush Script MT </option>
                            <option value="Futura"> Futura </option>
                        </select>
                    </div>
                    <div class="input-container">
                        <label for="hovercolor"> Color on Hover - </label>
                        <input type="color" name="hovercolor" value="#ffd700" id="hovercolor">
                    </div>
                    <div class="input-container">
                        <label for="dropdown-color"> Dropdown Color - </label>
                        <input type="color" name="dropdown-color" value="#ffd700" id="color-dropdown">
                    </div>
                    <div class="input-container">
                        <label for="bordercolor"> Border Color - </label>
                        <input type="color" name="bordercolor" value="#ffd700" id="bordercolor">
                    </div>
                    <div class="input-container">
                        <label for="boxShadowColor"> Box Shadow Color - </label>
                        <input type="color" name="boxShadowColor" value="#000000" id="boxShadowColor">
                    </div>
                    <input type="submit" value="Submit">
                </form>
            </section>
        </main>
        <script>
            const form=document.getElementsByTagName("form")[1];
            const imageRadio=document.getElementById("image-radio");
            const bgColorRadio=document.getElementById("bgcolor-radio");
            const bgImage=document.getElementById("bgimage");
            const bgColorLabel=document.getElementById("bgcolor-label");
            const bgColor=document.getElementById("bgcolor");
            const hfColor=document.getElementById("hfcolor");
            const txtColor=document.getElementById("txtcolor");
            const font=document.getElementById("font");
            const hoverColor=document.getElementById("hovercolor");
            const dropDownColor=document.getElementById("color-dropdown");
            const borderColor=document.getElementById("bordercolor");
            const boxShadow=document.getElementById("boxShadowColor");
            document.addEventListener("DOMContentLoaded", function(event)
            {
                const settings=JSON.parse(localStorage.getItem("settings"))||{};
                function updateBg()
                {
                    if(imageRadio.checked)
                    {
                        bgImage.style.display="block";
                        bgColorLabel.style.display="none";
                        bgColor.style.display="none";
                    }
                    else if(bgColorRadio.checked)
                    {
                        bgImage.style.display="none";
                        bgColorLabel.style.display="block";
                        bgColor.style.display="block";
                    }
                }
                imageRadio.addEventListener("change", updateBg);
                bgColorRadio.addEventListener("change", updateBg);
                updateBg();
                if(settings.bg==="image")
                    imageRadio.checked=true;
                else if(settings.bg==="color")
                    bgColorRadio.checked=true;
                if(settings.bgimg)
                    bgImg=settings.bgimg;
                if(settings.bgcolor)
                    bgColor.value=settings.bgcolor;
                if(settings.hfcolor)
                    hfColor.value=settings.hfcolor;
                if(settings.txtcolor)
                    txtColor.value=settings.txtcolor;
                if(settings.style)
                    font.value=settings.style;
                if(settings.hovercolor)
                    hoverColor.value=settings.hovercolor;
                if(settings.dropdowncolor)
                    dropDownColor.value=settings.dropdowncolor;
                if(settings.bordercolor)
                    borderColor.value=settings.bordercolor;
                if(settings.boxshadow)
                    boxShadow.value=settings.boxshadow;
                updateBg();
            });
            let bgImg="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse3.mm.bing.net%2Fth%2Fid%2FOIP.YbbxxABEI4rJ5RkX4jrc6AHaEJ%3Fpid%3DApi&f=1&ipt=57ee2e16f7e4ad4b771b8f4503739a117dd6fd98b4ff81510d3d4009c3889301&ipo=images";
            function changeBgImage()
            {
                let url=prompt("Image URL: ");
                let check=prompt("Enter CONFIRM to continue.");
                if(check==="CONFIRM")
                    bgImg=url;
                else
                {
                    alert("Background image change failed.");
                    return;
                }
            }
            form.addEventListener("submit", function(event)
            {
                event.preventDefault();
                let settings={
                    bg: imageRadio.checked?"image" : "color",
                    bgimg: imageRadio.checked? bgImg: "",
                    bgcolor: bgColor.value,
                    hfcolor: hfColor.value,
                    txtcolor: txtColor.value,
                    hovercolor: hoverColor.value,
                    style: font.value,
                    dropdowncolor: dropDownColor.value,
                    bordercolor: borderColor.value,
                    boxshadow: boxShadow.value
                }
                localStorage.setItem("settings", JSON.stringify(settings));
                window.location.href="home.html";
            });
        </script>
    </body>
</html>
