<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title> TRIPURAVIDYA - Settings - Appearance </title>
        <link rel="stylesheet" type="text/css" href="css/settings.css">
        <style>
            input
            {
                margin-bottom: 15px;
            }
            #display-password
            {
                font-size: 16px;
                margin: 10px;
            }
        </style>
    </head>
    <body>
        <header class="settings-container">
            <h2 class="heading"> Settings </h2>
            <form>
                <input type="search" name="search" id="search" placeholder="Search Settings">
            </form>
            <ul>
                <li> <a href="profile.html" target="_self"> <img src="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse1.mm.bing.net%2Fth%2Fid%2FOIP.bJpr9jpclIkXQT-hkkb1KQHaHa%3Fpid%3DApi&f=1&ipt=99411bbcbea5039044259eb2aa7c8f97dff7c34c372a067aa8aeb145e5024650&ipo=images"> Profile </a> </li>
                <li style="background-color: lightgray; border-radius: 4px;"> <a href="password.html" target="_self"> <img src="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse3.mm.bing.net%2Fth%2Fid%2FOIP.zbI6Pnvpz3JmcXxEY0CPHgHaHa%3Fpid%3DApi&f=1&ipt=0e82aba2d8b8e6e1e86491a8567495342fea767b6e71788cfb0b6f975c974b8b&ipo=images"> Password </a> </li>
                <li> <a href="appearance.html" target="_self"> <img src="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse3.mm.bing.net%2Fth%2Fid%2FOIP.B7tsaS4e1o9w28ewiWlvNgHaHa%3Fpid%3DApi&f=1&ipt=38e46b3f42b6afcb839524b85e70ad6400a3d6b9926f3d04cf5d1b46e3d7d0f6&ipo=images"> Appearance </a> </li>
                <li> <a href="reset.html" target="_self"> <img src="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse1.mm.bing.net%2Fth%2Fid%2FOIP.yZoDGitVuS1HHxCn1iJy0gHaHa%3Fpid%3DApi&f=1&ipt=ecf24811988edd43d929cd40e5e691e4b4a4dabe2cc8a14668c8263073f07d95&ipo=images"> Restore Settings </a> </li>
            </ul>
        </header>
        <a href="home.html" target="_self" style="position: absolute; top: 0px; left: 5px; font-weight: lighter;"> ✖ </a>
        <main>
            <h2 class="subheading"> Password </h2>
            <section class="container" style="display: block;">
                <input type="button" onclick="view()" value="View Password">
                <div id="display-password"></div> <br>
                <input type="button" onclick="window.location.href='change-password.html'" value="Change Password">
            </section>
        </main>
        <script>
            function view()
            {
                let profile=localStorage.getItem("profile")? JSON.parse(localStorage.getItem("profile")): null;
                let password=profile.password;
                let check=prompt("Enter CONFIRM to continue.");
                if(check==="CONFIRM")
                    document.getElementById("display-password").innerText=password;
            }
        </script>
    </body>
</html>
